name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: 构建 ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: amd64
            exe_name: MirrorPilot.exe
            portable_name: MirrorPilot_${{ github.ref_name }}_windows_amd64_portable.exe
          - platform: macos
            os: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
            exe_name: mirrorpilot
            portable_name: MirrorPilot_${{ github.ref_name }}_macos_aarch64_portable
          - platform: linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: amd64
            exe_name: mirrorpilot
            portable_name: MirrorPilot_${{ github.ref_name }}_linux_amd64_portable
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Linux 依赖
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装前端依赖
        working-directory: frontend
        run: npm install --registry https://registry.npmmirror.com

      - name: 构建 Tauri 应用
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'MirrorPilot ${{ github.ref_name }}'
          releaseBody: '详见 [CHANGELOG.md](https://github.com/JiGuilin/MirrorPilot/blob/master/CHANGELOG.md)'
          releaseDraft: false
          prerelease: false

      # ponytail: 上传单文件可执行程序（portable），与安装包一起提供
      # 先复制并重命名为带版本号的文件名，再上传
      - name: 上传单文件可执行程序
        shell: bash
        run: |
          EXE_PATH="frontend/src-tauri/target/release/${{ matrix.exe_name }}"
          PORTABLE_NAME="${{ matrix.portable_name }}"
          if [ -f "$EXE_PATH" ]; then
            echo "Copying and renaming to: $PORTABLE_NAME"
            cp "$EXE_PATH" "$PORTABLE_NAME"
            echo "Uploading portable executable: $PORTABLE_NAME"
            gh release upload "${{ github.ref_name }}" "$PORTABLE_NAME" --clobber --repo "${{ github.repository }}"
          else
            echo "Portable executable not found at $EXE_PATH"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # ponytail: 同步到 GitLab Release（默认禁用，需要时设置 vars.GITLAB_SYNC_ENABLED=true）
      - name: 同步到 GitLab Release
        if: ${{ vars.GITLAB_SYNC_ENABLED == 'true' }}
        shell: bash
        run: |
          PORTABLE_NAME="${{ matrix.portable_name }}"
          INSTALLER_PATH=$(find frontend/src-tauri/target/release/bundle -type f \( -name "*.msi" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \) | head -1)
          
          # 创建或获取 GitLab Release
          curl -s -H "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" \
            "${{ vars.GITLAB_URL }}/api/v4/projects/${{ vars.GITLAB_PROJECT_ID }}/releases/${{ github.ref_name }}" || \
          curl -s -X POST -H "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"MirrorPilot ${{ github.ref_name }}\",\"tag_name\":\"${{ github.ref_name }}\",\"description\":\"详见 CHANGELOG.md\"}" \
            "${{ vars.GITLAB_URL }}/api/v4/projects/${{ vars.GITLAB_PROJECT_ID }}/releases"
          
          # 上传 portable 文件
          if [ -f "$PORTABLE_NAME" ]; then
            curl -s --upload-file "$PORTABLE_NAME" \
              -H "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" \
              "${{ vars.GITLAB_URL }}/api/v4/projects/${{ vars.GITLAB_PROJECT_ID }}/packages/generic/mirrorpilot/${{ github.ref_name }}/${PORTABLE_NAME}"
          fi
          
          # 上传安装包
          if [ -n "$INSTALLER_PATH" ] && [ -f "$INSTALLER_PATH" ]; then
            INSTALLER_NAME=$(basename "$INSTALLER_PATH")
            curl -s --upload-file "$INSTALLER_PATH" \
              -H "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" \
              "${{ vars.GITLAB_URL }}/api/v4/projects/${{ vars.GITLAB_PROJECT_ID }}/packages/generic/mirrorpilot/${{ github.ref_name }}/${INSTALLER_NAME}"
          fi
        continue-on-error: true
