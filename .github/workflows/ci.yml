name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装前端依赖
        working-directory: frontend
        run: npm install

      - name: ESLint 检查
        working-directory: frontend
        run: npx eslint src/

      - name: TypeScript 类型检查
        working-directory: frontend
        run: npx tsc --noEmit

  build:
    name: 构建 ${{ matrix.platform }}
    needs: lint
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos
            os: macos-latest
            target: aarch64-apple-darwin
          - platform: linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Linux 依赖
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装前端依赖
        working-directory: frontend
        run: npm install

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'MirrorPilot ${{ github.ref_name }}'
          releaseBody: '详见 [CHANGELOG.md](https://github.com/JiGuilin/MirrorPilot/blob/master/CHANGELOG.md)'
          releaseDraft: true
          prerelease: false
