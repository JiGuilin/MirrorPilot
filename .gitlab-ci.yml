workflow:
  rules:
    - when: never  # ponytail: 暂时禁用所有 CI 触发

stages:
  - lint
  - build
  - release

variables:
  CARGO_TERM_COLOR: always

# --- 缓存 ---
.node_cache: &node_cache
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/node_modules/

# --- 代码检查 ---
lint:
  stage: lint
  tags:
    - shell
  <<: *node_cache
  before_script:
    # Vite 8 requires Node >=20.19; use nvm to ensure compatible version
    - export NVM_DIR="$HOME/.nvm"
    - 'if [ ! -s "$NVM_DIR/nvm.sh" ]; then curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash; fi'
    - . "$NVM_DIR/nvm.sh"
    - nvm install 22
    - nvm use 22
  script:
    - . "$HOME/.nvm/nvm.sh" && nvm use 22
    - cd frontend
    - npm ci
    - npx eslint src/
    - npx tsc --noEmit

# --- 构建 ---
build:linux:
  stage: build
  needs: [lint]
  tags:
    - shell
  before_script:
    # System deps must be pre-installed on the runner host (see Doc/centos8-tauri-deps.sh)
    - source "$HOME/.cargo/env"
    - export NVM_DIR="$HOME/.nvm"
    - 'if [ ! -s "$NVM_DIR/nvm.sh" ]; then curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash; fi'
    - . "$NVM_DIR/nvm.sh"
    - nvm install 22
    - nvm use 22
    - node --version
    - cd frontend
    - npm ci
  script:
    - source "$HOME/.cargo/env"
    - . "$HOME/.nvm/nvm.sh" && nvm use 22
    - npx tauri build
  artifacts:
    paths:
      - frontend/src-tauri/target/release/bundle/
    expire_in: 30 days

build:windows:
  stage: build
  needs: [lint]
  tags:
    - windows
  before_script:
    - cd frontend
    - npm ci
  script:
    - npx tauri build
  artifacts:
    paths:
      - frontend/src-tauri/target/release/bundle/
    expire_in: 30 days

# --- 发布 ---
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags:
    - shell          # ← 加上标签
  needs:
    - job: build:linux
      artifacts: true
    - job: build:windows
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - echo "自动发布 $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "MirrorPilot $CI_COMMIT_TAG"
    description: "详见 CHANGELOG.md"