stages:
  - lint
  - build
  - release

variables:
  CARGO_TERM_COLOR: always

# --- 缓存 ---
.node_cache: &node_cache
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/node_modules/

# --- 代码检查 ---
lint:
  stage: lint
  tags:
    - shell
  <<: *node_cache
  before_script:
    # Vite 8 requires Node >=20.19; use nvm to ensure compatible version
    - export NVM_DIR="$HOME/.nvm"
    - if [ ! -s "$NVM_DIR/nvm.sh" ]; then
        curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash;
      fi
    - . "$NVM_DIR/nvm.sh"
    - nvm install 22
    - nvm use 22
  script:
    - . "$HOME/.nvm/nvm.sh" && nvm use 22
    - cd frontend
    - npm ci
    - npx eslint src/
    - npx tsc --noEmit

# --- 构建 ---
build:linux:
  stage: build
  needs: [lint]
  tags:
    - shell
  before_script:
    # Install system deps — detect package manager (shell executor ignores `image`)
    - if command -v apt-get >/dev/null 2>&1; then
        apt-get update &&
        apt-get install -y curl libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev pkg-config build-essential;
      elif command -v dnf >/dev/null 2>&1; then
        dnf install -y curl webkit2gtk4.1-devel libappindicator-gtk3-devel librsvg2-devel patchelf openssl-devel pkgconf-pkg-config gcc gcc-c++ make;
      elif command -v yum >/dev/null 2>&1; then
        yum install -y curl webkit2gtk4.1-devel libappindicator-gtk3-devel librsvg2-devel patchelf openssl-devel pkgconfig gcc gcc-c++ make;
      else
        echo "WARNING: unsupported package manager, system deps may be missing";
      fi
    # Install Rust (idempotent if already present)
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source "$HOME/.cargo/env"
    # Install Node.js 22 LTS via nvm (Vite 8 requires >=20.19)
    - export NVM_DIR="$HOME/.nvm"
    - if [ ! -s "$NVM_DIR/nvm.sh" ]; then
        curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash;
      fi
    - . "$NVM_DIR/nvm.sh"
    - nvm install 22
    - nvm use 22
    - node --version
    - cd frontend
    - npm ci
  script:
    - . "$HOME/.cargo/env"
    - . "$HOME/.nvm/nvm.sh" && nvm use 22
    - npx tauri build
  artifacts:
    paths:
      - frontend/src-tauri/target/release/bundle/
    expire_in: 30 days

build:windows:
  stage: build
  needs: [lint]
  tags:
    - windows
  before_script:
    # Vite 8 requires Node >=20.19; use nvm to ensure compatible version
    - $env:NVM_HOME = "$env:USERPROFILE\AppData\Roaming\nvm"
    - if (-not (Test-Path $env:NVM_HOME\nvm.exe)) {
        curl -o nvm-setup.zip https://github.com/coreybutler/nvm-windows/releases/download/1.2.2/nvm-setup.exe;
        # ponytail: simplified — nvm-windows is usually pre-installed on the Windows runner
      }
    - cd frontend
    - npm ci
  script:
    - npx tauri build
  artifacts:
    paths:
      - frontend/src-tauri/target/release/bundle/
    expire_in: 30 days

# --- 发布 ---
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags:
    - shell          # ← 加上标签
  needs:
    - job: build:linux
      artifacts: true
    - job: build:windows
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - echo "自动发布 $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "MirrorPilot $CI_COMMIT_TAG"
    description: "详见 CHANGELOG.md"