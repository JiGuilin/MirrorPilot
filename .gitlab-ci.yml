# =============================================================================
# GitLab CI/CD 配置文件
# 用于在本地 GitLab (192.168.25.20:8000) 上构建 MirrorPilot 应用
# =============================================================================

# -----------------------------------------------------------------------------
# Workflow 规则：控制整个流水线的触发条件
# -----------------------------------------------------------------------------
# workflow:
#   rules:
#     # 只有打 tag 时才运行流水线（如 git tag v0.3.0 && git push gitlab v0.3.0）
#     # 推送到 master 分支不会触发，避免每次提交都构建
#     - if: $CI_COMMIT_TAG
#       when: always
#     # 其他情况（推分支、合并请求等）不运行
#     - when: never

# -----------------------------------------------------------------------------
# 定义流水线阶段（按顺序执行）
# -----------------------------------------------------------------------------
stages:
  - build      # 第一阶段：编译构建
  - release    # 第二阶段：创建 Release 并上传产物

# -----------------------------------------------------------------------------
# 全局变量
# -----------------------------------------------------------------------------
variables:
  # Rust/Cargo 缓存目录，避免每次下载依赖
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  # Node.js 版本
  NODE_VERSION: "20"

# -----------------------------------------------------------------------------
# 缓存配置：加速后续构建
# 注意：每个 job 的缓存 key 不同，Linux 和 Windows 缓存独立
# ponytail: 用 ${CI_JOB_NAME_SLUG} 代替 ${CI_JOB_NAME}，避免冒号导致 Windows 路径错误
# ponytail: target/ 和 .cargo/ 太大（6000+ 文件），缓存耗时过长，已禁用
# -----------------------------------------------------------------------------
cache:
  key: ${CI_JOB_NAME_SLUG}
  paths:
  #  - frontend/node_modules/          # npm 依赖
  #  - frontend/src-tauri/target/      # Rust 编译产物（太大，禁用）
  #  - .cargo/                         # Cargo 下载的 crate（太大，禁用）

# =============================================================================
# Job 1: Linux 构建
# 在 Ubuntu 容器内编译 Linux 版本（AppImage 和 deb 包）
# =============================================================================
build:linux:
  stage: build
  # 使用 Ubuntu 22.04 镜像（Tauri 2.x 需要 webkit2gtk-4.1）
  image: ubuntu:22.04
  # 需要注册一个带 shell executor 的 Runner，并打上 shell tag
  tags:
    - linux
  # 构建前的环境准备
  before_script:
    # 安装 Tauri 所需的系统依赖（需要 sudo）
    - sudo apt-get update
    - sudo apt-get install -y curl gcc libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
    # 安装 Rust（不需要 sudo，装到项目目录）
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source $CARGO_HOME/env
    - rustup target add x86_64-unknown-linux-gnu
    # 安装 Node.js 20（需要 sudo）
    - curl -fsSL https://deb.nodesource.com/setup_20.x | sudo bash -
    - sudo apt-get install -y nodejs
  # 实际构建步骤
  script:
    - cd frontend && npm install
    - npm run tauri build
  # ponytail: GitLab 免费版 artifacts 限制 100MB，只传最终产物文件
  artifacts:
    paths:
      - frontend/src-tauri/target/release/mirrorpilot
      - frontend/src-tauri/target/release/bundle/deb/*.deb
      - frontend/src-tauri/target/release/bundle/rpm/*.rpm
    expire_in: 1 day  # 1天后自动清理，节省空间
  # ponytail: Linux 构建失败不阻塞 Release（Kylin OS 系统库版本太旧）
  allow_failure: true
  # 只在打 tag 时运行
  # only:
  #   - tags

# =============================================================================
# Job 2: Linux ARM64 构建（使用 Docker+QEMU 交叉编译）
# =============================================================================
build:linux-arm64:
  stage: build
  image: 192.168.25.20:8083/arm64v8/ubuntu:22.04
  tags:
    - docker
  variables:
    DOCKER_MEMORY: 8g
    DOCKER_MEMORY_SWAP: 8g
  before_script:
    # 安装 Tauri 所需的系统依赖
    - apt-get update
    - apt-get install -y curl gcc libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
    # 安装 Rust
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source $HOME/.cargo/env
    - rustup target add aarch64-unknown-linux-gnu
    # 安装 Node.js 20
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y nodejs
  script:
    - cd frontend && npm install
    - npm run tauri build
  artifacts:
    paths:
      - frontend/src-tauri/target/release/mirrorpilot
      - frontend/src-tauri/target/release/bundle/deb/*.deb
      - frontend/src-tauri/target/release/bundle/rpm/*.rpm
    expire_in: 1 day
  allow_failure: true

# =============================================================================
# Job 3: Windows 构建
# 在 Windows Runner 上编译 Windows 版本（MSI 安装包和 exe）
# =============================================================================
build:windows:
  stage: build
  # 需要注册一个 Windows 系统的 Runner，并打上 windows tag
  tags:
    - windows
  before_script:
    # 检查/安装 Rust（如果未安装）
    # 注意：rustup 会安装到 CARGO_HOME 目录，默认是项目目录下的 .cargo
    - $cargoBin = "$env:CARGO_HOME\bin"; if (!(Test-Path "$cargoBin\rustc.exe")) { Write-Host "Installing Rust..."; Invoke-WebRequest -Uri https://win.rustup.rs/x86_64 -OutFile rustup-init.exe; .\rustup-init.exe -y --default-toolchain stable }; $env:PATH = "$cargoBin;$env:PATH"
    - node --version
    - $env:PATH = "$env:CARGO_HOME\bin;$env:PATH"; rustc --version
    - $env:PATH = "$env:CARGO_HOME\bin;$env:PATH"; cargo --version
  script:
    - cd frontend && npm install
    - npm run tauri build
  artifacts:
    paths:
      - frontend/src-tauri/target/release/bundle/          # MSI 安装包
      - frontend/src-tauri/target/release/mirrorpilot.exe  # 单文件可执行程序
    expire_in: 1 week
  # only:
  #   - tags
  # Windows 构建失败不阻塞 Release（可选依赖，Linux 是主要的）
  allow_failure: true

# =============================================================================
# Job 3: Release - Linux
# 在 Linux Runner 上上传 Linux 构建产物
# =============================================================================
release:linux:
  stage: release
  tags:
    - linux
  dependencies:
    - build:linux
  before_script:
    - sudo apt-get update && sudo apt-get install -y curl zip
    # 从 Cargo.toml 读取版本号
    - |
      export VERSION=$(grep -E '^version\s*=\s*"[^"]+"' frontend/src-tauri/Cargo.toml | head -1 | sed -E 's/version\s*=\s*"([^"]+)".*/\1/')
      if [ -z "$VERSION" ]; then
        export VERSION=${CI_COMMIT_SHORT_SHA}
      fi
      echo "VERSION = ${VERSION}"
  script:
    # 创建 GitLab Release（如果不存在）
    - |
      curl -s -X POST -H "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
        -H "Content-Type: application/json" \
        -d "{\"name\":\"MirrorPilot ${VERSION}\",\"tag_name\":\"${VERSION}\",\"description\":\"详见 CHANGELOG.md\"}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" || true
    # 压缩并上传 Linux portable
    - |
      if [ -f "frontend/src-tauri/target/release/mirrorpilot" ]; then
        zip -j "MirrorPilot_${VERSION}_linux_amd64_portable.zip" frontend/src-tauri/target/release/mirrorpilot
        curl -s --upload-file "MirrorPilot_${VERSION}_linux_amd64_portable.zip" \
          -H "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/mirrorpilot/${VERSION}/MirrorPilot_${VERSION}_linux_amd64_portable.zip"
      fi
    # 压缩并上传 deb 包
    - |
      if ls frontend/src-tauri/target/release/bundle/deb/*.deb 1> /dev/null 2>&1; then
        zip -j "MirrorPilot_${VERSION}_linux_amd64_deb.zip" frontend/src-tauri/target/release/bundle/deb/*.deb
        echo "Uploading deb zip..."
        curl -s --upload-file "MirrorPilot_${VERSION}_linux_amd64_deb.zip" \
          -H "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/mirrorpilot/${VERSION}/MirrorPilot_${VERSION}_linux_amd64_deb.zip"
      fi
    # 压缩并上传 rpm 包
    - |
      if ls frontend/src-tauri/target/release/bundle/rpm/*.rpm 1> /dev/null 2>&1; then
        zip -j "MirrorPilot_${VERSION}_linux_amd64_rpm.zip" frontend/src-tauri/target/release/bundle/rpm/*.rpm
        echo "Uploading rpm zip..."
        curl -s --upload-file "MirrorPilot_${VERSION}_linux_amd64_rpm.zip" \
          -H "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/mirrorpilot/${VERSION}/MirrorPilot_${VERSION}_linux_amd64_rpm.zip"
      fi
  allow_failure: true

# =============================================================================
# Job 4: Release - Linux ARM64
# =============================================================================
release:linux-arm64:
  stage: release
  image: ubuntu:22.04
  tags:
    - docker
  dependencies:
    - build:linux-arm64
  before_script:
    - apt-get update && apt-get install -y curl zip
    # 从 Cargo.toml 读取版本号
    - |
      export VERSION=$(grep -E '^version\s*=\s*"[^"]+"' frontend/src-tauri/Cargo.toml | head -1 | sed -E 's/version\s*=\s*"([^"]+)".*/\1/')
      if [ -z "$VERSION" ]; then
        export VERSION=${CI_COMMIT_SHORT_SHA}
      fi
      echo "VERSION = ${VERSION}"
  script:
    # 压缩并上传 Linux ARM64 portable
    - |
      if [ -f "frontend/src-tauri/target/release/mirrorpilot" ]; then
        zip -j "MirrorPilot_${VERSION}_linux_arm64_portable.zip" frontend/src-tauri/target/release/mirrorpilot
        curl -s --upload-file "MirrorPilot_${VERSION}_linux_arm64_portable.zip" \
          -H "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/mirrorpilot/${VERSION}/MirrorPilot_${VERSION}_linux_arm64_portable.zip"
      fi
    # 压缩并上传 deb 包
    - |
      if ls frontend/src-tauri/target/release/bundle/deb/*.deb 1> /dev/null 2>&1; then
        zip -j "MirrorPilot_${VERSION}_linux_arm64_deb.zip" frontend/src-tauri/target/release/bundle/deb/*.deb
        echo "Uploading deb zip..."
        curl -s --upload-file "MirrorPilot_${VERSION}_linux_arm64_deb.zip" \
          -H "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/mirrorpilot/${VERSION}/MirrorPilot_${VERSION}_linux_arm64_deb.zip"
      fi
    # 压缩并上传 rpm 包
    - |
      if ls frontend/src-tauri/target/release/bundle/rpm/*.rpm 1> /dev/null 2>&1; then
        zip -j "MirrorPilot_${VERSION}_linux_arm64_rpm.zip" frontend/src-tauri/target/release/bundle/rpm/*.rpm
        echo "Uploading rpm zip..."
        curl -s --upload-file "MirrorPilot_${VERSION}_linux_arm64_rpm.zip" \
          -H "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/mirrorpilot/${VERSION}/MirrorPilot_${VERSION}_linux_arm64_rpm.zip"
      fi
  allow_failure: true

# =============================================================================
# Job 5: Release - Windows
# 在 Windows Runner 上上传 Windows 构建产物
# =============================================================================
release:windows:
  stage: release
  tags:
    - windows
  dependencies:
    - build:windows
  before_script:
    # 从 Cargo.toml 读取版本号
    - |
      $cargoToml = Get-Content "frontend/src-tauri/Cargo.toml" -Raw
      if ($cargoToml -match 'version\s*=\s*"([^"]+)"') {
        $env:VERSION = $matches[1]
      } else {
        $env:VERSION = ${env:CI_COMMIT_SHORT_SHA}
      }
      Write-Host "VERSION = ${env:VERSION}"
  script:
    # 压缩并上传 Windows portable
    - |
      $portablePath = "frontend/src-tauri/target/release/mirrorpilot.exe"
      if (Test-Path $portablePath) {
        $zipPath = "MirrorPilot_${env:VERSION}_windows_amd64_portable.zip"
        $fullZipPath = (Resolve-Path .).Path + "\" + $zipPath
        Compress-Archive -Path $portablePath -DestinationPath $fullZipPath -Force
        Write-Host "Created zip: $fullZipPath"
        curl -s --upload-file "$fullZipPath" `
          -H "JOB-TOKEN: ${env:CI_JOB_TOKEN}" `
          "${env:CI_API_V4_URL}/projects/${env:CI_PROJECT_ID}/packages/generic/mirrorpilot/${env:VERSION}/${zipPath}"
      } else {
        Write-Host "Portable executable not found at $portablePath"
      }
    # 压缩并上传 MSI 安装包
    - |
      $msiFiles = Get-ChildItem "frontend/src-tauri/target/release/bundle/msi/*.msi" -ErrorAction SilentlyContinue
      if ($msiFiles -and $msiFiles.Count -gt 0) {
        $zipPath = "MirrorPilot_${env:VERSION}_windows_amd64_msi.zip"
        $fullZipPath = (Resolve-Path .).Path + "\" + $zipPath
        $msiPaths = $msiFiles | Select-Object -ExpandProperty FullName
        Compress-Archive -Path $msiPaths -DestinationPath $fullZipPath -Force
        Write-Host "Created zip: $fullZipPath"
        curl -s --upload-file "$fullZipPath" `
          -H "JOB-TOKEN: ${env:CI_JOB_TOKEN}" `
          "${env:CI_API_V4_URL}/projects/${env:CI_PROJECT_ID}/packages/generic/mirrorpilot/${env:VERSION}/${zipPath}"
      } else {
        Write-Host "No MSI files found"
      }
    # 压缩并上传 NSIS 安装包
    - |
      $nsisFiles = Get-ChildItem "frontend/src-tauri/target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue
      if ($nsisFiles -and $nsisFiles.Count -gt 0) {
        $zipPath = "MirrorPilot_${env:VERSION}_windows_amd64_nsis.zip"
        $fullZipPath = (Resolve-Path .).Path + "\" + $zipPath
        $nsisPaths = $nsisFiles | Select-Object -ExpandProperty FullName
        Compress-Archive -Path $nsisPaths -DestinationPath $fullZipPath -Force
        Write-Host "Created zip: $fullZipPath"
        curl -s --upload-file "$fullZipPath" `
          -H "JOB-TOKEN: ${env:CI_JOB_TOKEN}" `
          "${env:CI_API_V4_URL}/projects/${env:CI_PROJECT_ID}/packages/generic/mirrorpilot/${env:VERSION}/${zipPath}"
      } else {
        Write-Host "No NSIS files found"
      }
  allow_failure: true

