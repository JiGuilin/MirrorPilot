stages:
  - lint
  - build
  - release

variables:
  CARGO_TERM_COLOR: always

# --- 缓存 ---
.node_cache: &node_cache
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths:
      - frontend/node_modules/

# --- 代码检查 ---
lint:
  stage: lint
  image: node:20
  tags:
    - shell          # ← 加上标签
  <<: *node_cache
  script:
    - cd frontend
    - npm ci
    - npx eslint src/
    - npx tsc --noEmit

# --- 构建 ---
build:linux:
  stage: build
  needs: [lint]
  image: ubuntu:22.04
  tags:
    - shell          # ← 加上标签
  before_script:
    - apt-get update && apt-get install -y curl libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev pkg-config build-essential
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source "$HOME/.cargo/env"
    - cd frontend
    - npm ci
  script:
    - npx tauri build
  artifacts:
    paths:
      - frontend/src-tauri/target/release/bundle/
    expire_in: 30 days

build:windows:
  stage: build
  needs: [lint]
  tags:
    - windows        # ← 这个需要 Windows 环境的 Runner
  before_script:
    - cd frontend
    - npm ci
  script:
    - npx tauri build
  artifacts:
    paths:
      - frontend/src-tauri/target/release/bundle/
    expire_in: 30 days

# --- 发布 ---
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags:
    - shell          # ← 加上标签
  needs:
    - job: build:linux
      artifacts: true
    - job: build:windows
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - echo "自动发布 $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "MirrorPilot $CI_COMMIT_TAG"
    description: "详见 CHANGELOG.md"